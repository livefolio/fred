name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
        # If the FRED_API_KEY secret is set on the repo, the live integration
        # test in src/integration.test.ts runs against the real FRED API.
        # Otherwise the secret expands to an empty string and the test
        # auto-skips via its `apiKey.length > 0` gate.
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

      # The mcp workspace builds with tsup dts:false, so the build does NOT
      # type-check (unlike the root package, whose dts:true build emits and
      # checks declarations). Run tsc --noEmit explicitly via the typecheck
      # script. The mcp tests are fully offline (DI stub + in-memory transport),
      # so they need no FRED_API_KEY.
      - run: npm run build --workspace=mcp
      - run: npm run typecheck --workspace=mcp
      - run: npm run lint --workspace=mcp
      - run: npm test --workspace=mcp

  version-guard:
    # If a PR touches src/ (root) or mcp/src/, the matching package.json version
    # must be bumped. Merging without a bump would block the release job on main
    # (which only publishes when the version is ahead of npm), silently shipping
    # nothing — this check fails loudly at PR time instead.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bumps when src/ changes
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          BASE_SHA=$(git merge-base "origin/${BASE_REF}" HEAD)

          check_pkg() {
            local label="$1"
            local src_path="$2"
            local pkg_path="$3"

            local changed
            changed=$(git diff --name-only "${BASE_SHA}" HEAD -- "${src_path}" | wc -l | tr -d ' ')

            if [ "$changed" = "0" ]; then
              echo "[$label] No changes under ${src_path}; version bump not required."
              return 0
            fi

            # A brand-new package (no package.json at the base) has nothing to
            # bump from — its first version is the initial release.
            if ! git cat-file -e "${BASE_SHA}:${pkg_path}" 2>/dev/null; then
              echo "[$label] ${pkg_path} is new in this PR; version bump not required."
              return 0
            fi

            local current previous
            current=$(node -p "require('./${pkg_path}').version")
            previous=$(git show "${BASE_SHA}:${pkg_path}" | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")

            if [ "$current" = "$previous" ]; then
              echo "::error::[${label}] ${src_path} changed but ${pkg_path} version is unchanged ($current). Bump ${pkg_path} (e.g. 'npm version patch --no-git-tag-version') before merging."
              return 1
            fi

            echo "[$label] Version bumped: $previous -> $current (${src_path} touched $changed file(s))."
          }

          fail=0
          check_pkg fred src/ package.json || fail=1
          check_pkg fred-mcp mcp/src/ mcp/package.json || fail=1
          exit $fail

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Compare against the version actually on npm, not git history. The
      # HEAD-vs-HEAD^ heuristic is fooled by orphaned merge commits and silently
      # skips publishing. `npm view` is the source of truth: if a package.json is
      # ahead of npm, publish that package; otherwise skip it. The two packages
      # version and release independently.
      - name: Check which packages need publishing
        id: version
        run: |
          ROOT_CURRENT=$(node -p "require('./package.json').version")
          ROOT_PUBLISHED=$(npm view @livefolio/fred version 2>/dev/null || echo "none")
          if [ "$ROOT_CURRENT" = "$ROOT_PUBLISHED" ]; then
            echo "root_changed=false" >> "$GITHUB_OUTPUT"
            echo "fred: $ROOT_CURRENT already on npm; skipping."
          else
            echo "root_changed=true" >> "$GITHUB_OUTPUT"
            echo "root_version=$ROOT_CURRENT" >> "$GITHUB_OUTPUT"
            echo "fred: publish $ROOT_CURRENT (last on npm: $ROOT_PUBLISHED)"
          fi

          MCP_CURRENT=$(node -p "require('./mcp/package.json').version")
          MCP_PUBLISHED=$(npm view @livefolio/fred-mcp version 2>/dev/null || echo "none")
          if [ "$MCP_CURRENT" = "$MCP_PUBLISHED" ]; then
            echo "mcp_changed=false" >> "$GITHUB_OUTPUT"
            echo "fred-mcp: $MCP_CURRENT already on npm; skipping."
          else
            echo "mcp_changed=true" >> "$GITHUB_OUTPUT"
            echo "mcp_version=$MCP_CURRENT" >> "$GITHUB_OUTPUT"
            echo "fred-mcp: publish $MCP_CURRENT (last on npm: $MCP_PUBLISHED)"
          fi

      - run: npm ci
        if: steps.version.outputs.root_changed == 'true' || steps.version.outputs.mcp_changed == 'true'

      - run: npm run build
        if: steps.version.outputs.root_changed == 'true'

      - name: Publish @livefolio/fred
        if: steps.version.outputs.root_changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release for @livefolio/fred
        if: steps.version.outputs.root_changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.root_version }}"
          gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - run: npm run build --workspace=mcp
        if: steps.version.outputs.mcp_changed == 'true'

      - name: Publish @livefolio/fred-mcp
        if: steps.version.outputs.mcp_changed == 'true'
        run: npm publish --access public --workspace=mcp
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release for @livefolio/fred-mcp
        if: steps.version.outputs.mcp_changed == 'true'
        run: |
          VERSION="${{ steps.version.outputs.mcp_version }}"
          gh release create "fred-mcp-v${VERSION}" --title "fred-mcp v${VERSION}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
