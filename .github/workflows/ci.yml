name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm ci
      - run: npm run build
      - run: npm run lint
      - run: npm test
        # If the FRED_API_KEY secret is set on the repo, the live integration
        # test in src/integration.test.ts runs against the real FRED API.
        # Otherwise the secret expands to an empty string and the test
        # auto-skips via its `apiKey.length > 0` gate.
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}

  version-guard:
    # If a PR touches src/, it must bump the package version. Merging without a
    # bump would block the release job on main (which only publishes when the
    # version changes), silently shipping nothing — this check fails loudly at
    # PR time instead.
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version bump when src/ changes
        env:
          BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: |
          BASE_SHA=$(git merge-base "origin/${BASE_REF}" HEAD)

          SRC_CHANGED=$(git diff --name-only "${BASE_SHA}" HEAD -- src/ | wc -l | tr -d ' ')

          if [ "$SRC_CHANGED" = "0" ]; then
            echo "No changes under src/; version bump not required."
            exit 0
          fi

          CURRENT=$(node -p "require('./package.json').version")
          PREVIOUS=$(git show "${BASE_SHA}:package.json" | node -p "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).version")

          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "::error::src/ changed but package.json version is unchanged ($CURRENT). Bump the version (e.g. 'npm version patch --no-git-tag-version') before merging."
            exit 1
          fi

          echo "Version bumped: $PREVIOUS -> $CURRENT (src/ touched $SRC_CHANGED file(s))."

  release:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      # Compare against the version actually on npm, not git history. The
      # HEAD-vs-HEAD^ heuristic is fooled by orphaned merge commits and silently
      # skips publishing. `npm view` is the source of truth: if package.json is
      # ahead of npm, publish; otherwise skip.
      - name: Check if version needs publishing
        id: version
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          PUBLISHED=$(npm view @livefolio/fred version 2>/dev/null || echo "none")
          if [ "$CURRENT" = "$PUBLISHED" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version $CURRENT already on npm; skipping release."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Version to publish: $CURRENT (last on npm: $PUBLISHED)"
          fi

      - run: npm ci
        if: steps.version.outputs.changed == 'true'

      - run: npm run build
        if: steps.version.outputs.changed == 'true'

      - name: Publish to npm
        if: steps.version.outputs.changed == 'true'
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        if: steps.version.outputs.changed == 'true'
        run: |
          VERSION=$(node -p "require('./package.json').version")
          gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
